version: "3.3"
services:
  redis:
    image: redis:latest
    platform: linux/amd64
  mysql:
    image: mysql:5.7
    platform: linux/amd64
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: app
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  web:
    build: .
    depends_on:
      - redis
      - mysql
    command: tail -f /unfazed/README.md
    volumes:
      - .:/unfazed
